server:
  port: 8088
  servlet:
    context-path: /

spring:
  application:
    name: ai-gaokao

  # 激活 dev 配置文件
  profiles:
    active: dev

  # 静态资源配置
  mvc:
    log-resolved-exception: false
  web:
    resources:
      add-mappings: true

  # 数据源配置
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/gaokao?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: ${mysql.password}
    druid:
      initial-size: 5
      min-idle: 5
      max-active: 20
      max-wait: 60000
      time-between-eviction-runs-millis: 60000
      min-evictable-idle-time-millis: 300000
      validation-query: SELECT 1
      test-while-idle: true
      test-on-borrow: false
      test-on-return: false
      pool-prepared-statements: true
      max-pool-prepared-statement-per-connection-size: 20

  # Redis 配置
  data:
    redis:
      host: ${redis.host}
      port: 6379
      password: ${redis.password}
      database: 0
      timeout: 10000ms
      lettuce:
        pool:
          max-active: 8
          max-wait: 10000ms
          max-idle: 8
          min-idle: 0

  # PGVector 数据源配置（已注释，使用 Elasticsearch 作为向量数据库）
  # pgvector:
  #   datasource:
  #     driver-class-name: org.postgresql.Driver
  #     url: jdbc:postgresql://localhost:5432/gaokao_vector
  #     username: postgres
  #     password: ${pgvector.password}

  # QQ邮箱配置
  mail:
    host: smtp.qq.com
    port: 465
    username: 3088731183@qq.com
    password: ${mail.password}
    properties:
      mail:
        smtp:
          auth: true
          ssl:
            enable: true
          socketFactory:
            class: javax.net.ssl.SSLSocketFactory
            port: 465
    nickname: 高考志愿填报系统

# LangChain4j 配置 (阿里通义千问 - OpenAI兼容模式)
langchain4j:
  open-ai:
    api-key: ${dashscope.api-key}
    base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
    chat-model:
      model-name: qwen-plus
      temperature: 0.7
      max-tokens: 4096
    embedding-model:
      model-name: text-embedding-v3

  # 向量存储配置
  vectorstore:
    # 类型: elasticsearch(生产) 或 memory(开发测试) 或 pgvector(PostgreSQL)
    type: elasticsearch
    elasticsearch:
      index: gaokao_embeddings
    pgvector:
      table: gaokao_embeddings
      dimension: 1536
      use-index: true
      create-table: true

# Elasticsearch 配置
elasticsearch:
  host: ${es.host}
  port: ${es.port}
  username: ${es.username:}
  password: ${es.password:}
  use-ssl: ${es.use-ssl:false}

# MyBatis Plus 配置
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.gaokao.*.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: assign_id
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# Knife4j 配置
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs
  group-configs:
    - group: 'default'
      paths-to-match: '/**'
      packages-to-scan: com.gaokao.web.controller

knife4j:
  enable: true
  setting:
    language: zh_cn

# 日志配置
logging:
  level:
    com.gaokao: debug
    dev.langchain4j: debug
  pattern:
    console: '%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{50} - %msg%n'